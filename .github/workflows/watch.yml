name: Odyssey Watcher

on:
  workflow_dispatch:        # lets you start it manually from the Actions tab
  schedule:
    - cron: "0 */4 * * *"   # restarts every 4h; each job runs ~5h -> overlapping, gapless

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run watcher
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python check_odyssey.py
